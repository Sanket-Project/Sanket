apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sanket
  labels: { app: frontend }
spec:
  replicas: 2
  selector: { matchLabels: { app: frontend } }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/sanket-project/frontend:latest
          ports: [{ name: http, containerPort: 8080 }]
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 250m, memory: 128Mi }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # nginx writes to /var/cache/nginx
            capabilities: { drop: [ALL] }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: sanket
spec:
  selector: { app: frontend }
  ports: [{ name: http, port: 80, targetPort: http }]
