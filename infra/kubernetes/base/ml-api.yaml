apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-api
  namespace: sanket
  labels: { app: ml-api, component: inference }
spec:
  replicas: 2
  selector: { matchLabels: { app: ml-api } }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: ml-api, component: inference }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: inference
          image: ghcr.io/sanket-project/ml-api:latest
          imagePullPolicy: IfNotPresent
          ports: [{ name: http, containerPort: 8001 }]
          env:
            - name: ML_DATABASE_URL
              valueFrom: { secretKeyRef: { name: sanket-db-url, key: ML_DATABASE_URL } }
            # Service-to-service auth — rejects any request without this bearer.
            - name: ML_SERVICE_TOKEN
              valueFrom: { secretKeyRef: { name: sanket-secrets, key: ML_SERVICE_TOKEN } }
            - { name: ML_REQUIRE_AUTH, value: "true" }
            - { name: ML_CHRONOS_PRELOAD_ON_STARTUP, value: "true" }
            - { name: ML_DEVICE, value: cpu }
            - { name: ML_ARTIFACT_ROOT, value: /var/sanket/artifacts }
            - { name: HF_HOME, value: /var/sanket/hf-cache }
            - { name: OMP_NUM_THREADS, value: "4" }
          resources:
            # Chronos-T5-Large fits in ~3 GiB; we leave headroom for batched inference.
            requests: { cpu: "1",   memory: 4Gi }
            limits:   { cpu: "4",   memory: 8Gi }
          startupProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 10
            failureThreshold: 18   # 3 min for cold weight load
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 30
            initialDelaySeconds: 180
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: artifacts, mountPath: /var/sanket/artifacts }
            - { name: hf-cache,  mountPath: /var/sanket/hf-cache }
      volumes:
        - { name: artifacts, persistentVolumeClaim: { claimName: ml-artifacts } }
        - { name: hf-cache,  emptyDir: { sizeLimit: 10Gi } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-artifacts
  namespace: sanket
spec:
  accessModes: [ReadWriteMany]   # multi-replica reads; falls back to RWO if RWX unavailable
  resources:
    requests: { storage: 100Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: ml-api
  namespace: sanket
spec:
  selector: { app: ml-api }
  ports: [{ name: http, port: 8001, targetPort: http }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ml-api
  namespace: sanket
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ml-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 75 }
