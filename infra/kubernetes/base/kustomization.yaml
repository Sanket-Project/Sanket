apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sanket

resources:
  - namespace.yaml
  # secrets.yaml is intentionally NOT listed here.
  # Real secrets must be bootstrapped out-of-band via:
  #   kubectl create secret generic sanket-secrets ...
  #   kubectl create secret generic sanket-db-url ...
  # See infra/kubernetes/base/secrets.yaml.example for the required keys.
  - postgres.yaml
  - redis.yaml
  - backend.yaml
  - ml-api.yaml
  - frontend.yaml
  - ingress.yaml
  - pdb.yaml

commonLabels:
  app.kubernetes.io/part-of: sanket
  app.kubernetes.io/managed-by: kustomize

images:
  - name: ghcr.io/sanket-project/backend
    newTag: latest
  - name: ghcr.io/sanket-project/ml-api
    newTag: latest
  - name: ghcr.io/sanket-project/frontend
    newTag: latest
