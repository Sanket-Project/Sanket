global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: sanket-local
    env: dev

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: sanket-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: backend

  - job_name: sanket-ml-api
    metrics_path: /metrics
    static_configs:
      - targets: ["ml-api:8001"]
        labels:
          service: ml-api

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
