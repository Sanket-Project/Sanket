server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml font/woff2;

    # Security headers
    add_header X-Frame-Options              "DENY" always;
    add_header X-Content-Type-Options       "nosniff" always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains" always;
    add_header Cross-Origin-Opener-Policy    "same-origin" always;

    # Content-Security-Policy
    # - connect-src: only wss: (encrypted WebSocket), NOT ws: — unencrypted WS not permitted in production
    # - style-src:   'unsafe-inline' retained for Tailwind CSS-in-JS compatibility; migrate to nonce-based CSP as a future improvement
    # - script-src:  Google APIs only for Firebase Auth popup
    add_header Content-Security-Policy "\
default-src 'self'; \
base-uri 'self'; \
object-src 'none'; \
frame-ancestors 'none'; \
img-src 'self' data: https:; \
font-src 'self' data:; \
style-src 'self' 'unsafe-inline'; \
script-src 'self' https://apis.google.com https://www.gstatic.com; \
connect-src 'self' wss: https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://*.googleapis.com; \
frame-src 'self' https://*.firebaseapp.com https://accounts.google.com; \
form-action 'self'" always;

    # Long-cache hashed assets
    location ~* \.(?:js|css|woff2|svg|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API proxy — handled by ingress/loadbalancer in Kubernetes but this
    # nginx fallback works in single-host docker compose. Upstream is resolved
    # lazily (variable + resolver) so nginx still STARTS when "backend" is not
    # resolvable at boot — e.g. under kustomize namePrefix the service is
    # "stg-backend", not "backend". Without this, nginx aborts with
    # `[emerg] host not found in upstream "backend"` and crash-loops. In k8s
    # the Ingress routes /api/ directly, so this fallback path is rarely hit.
    location /api/ {
        resolver           127.0.0.11 valid=10s;
        set $api_upstream  backend;
        proxy_pass         http://$api_upstream:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Lazy upstream resolution via Docker embedded DNS so nginx still starts
    # when the optional ml-api container is absent (lite stack); ML-direct
    # routes then return 502 while backend /api/ serves its synthetic fallback.
    location ~ ^/ml/(.*)$ {
        resolver           127.0.0.11 valid=10s;
        set $ml_upstream   ml-api;
        proxy_pass         http://$ml_upstream:8001/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
