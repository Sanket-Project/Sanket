apiVersion: apps/v1
kind: Deployment
metadata: { name: backend, namespace: prisma }
spec:
  template:
    spec:
      containers:
        - name: api
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "2Gi" }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: ml-api, namespace: prisma }
spec:
  template:
    spec:
      containers:
        - name: inference
          resources:
            requests: { cpu: "2",  memory: "6Gi" }
            limits:   { cpu: "6",  memory: "12Gi" }
