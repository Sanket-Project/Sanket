apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prisma

resources:
  - ../../base

commonLabels:
  app.kubernetes.io/environment: production

patches:
  - path: replicas.yaml
  - path: resources.yaml
  - path: db-pooler.yaml

images:
  - name: ghcr.io/baltejgoud/backend
    newTag: stable
  - name: ghcr.io/baltejgoud/ml-api
    newTag: stable
  - name: ghcr.io/baltejgoud/frontend
    newTag: stable
