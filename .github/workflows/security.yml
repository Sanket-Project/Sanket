name: security

# Repository-wide security scanning that is not tied to a specific service path.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly Monday 06:00 UTC

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so a secret added in any commit is caught
      # Use the gitleaks CLI binary (MIT, free) rather than gitleaks-action,
      # which requires a paid GITLEAKS_LICENSE for organization repos and would
      # otherwise fail this job. Respects the committed .gitleaksignore.
      - name: Install gitleaks
        # Advisory: a pinned release asset can 404 if upstream prunes it, so
        # tolerate a failed install (the detect step is also continue-on-error).
        continue-on-error: true
        run: |
          VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
      - name: gitleaks detect
        # Hard gate on committed secrets: fails if any new leaks are found.
        # Fingerprints are pinned in .gitleaksignore.
        run: gitleaks detect --source . --redact --no-banner

  # Static analysis for Python security anti-patterns. The bandit ruleset via
  # ruff "S" is already enforced in backend-ci; this adds a deeper, dedicated pass.
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "bandit[toml]"
      - name: bandit
        # -ll: report only medium+ severity, -ii: medium+ confidence. Skips tests/.
        run: bandit -r backend/app backend/ml/sanket_ml -ll -ii -x '**/tests/**'
