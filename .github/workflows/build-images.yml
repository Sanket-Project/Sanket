name: build-images

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: backend,  context: backend,     dockerfile: backend/Dockerfile }
          - { name: ml-api,   context: backend/ml,  dockerfile: backend/ml/Dockerfile }
          - { name: frontend, context: frontend,    dockerfile: frontend/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      # Resolve the (lowercased) image name and the exact sha-tag that
      # docker/metadata-action will produce. On pull_request events the sha tag
      # is built from the PR head SHA, NOT github.sha (the synthetic merge
      # commit), so resolve both cases here and reuse the outputs everywhere.
      # NOTE: derives the owner from ${{ github.repository_owner }}, so pushing
      # this repo under the Sanket-Project org publishes to
      # ghcr.io/sanket-project/<name> automatically — nothing hardcoded.
      - name: Resolve image metadata
        id: img
        shell: bash
        run: |
          owner="${{ github.repository_owner }}"
          sha="${{ github.event.pull_request.head.sha || github.sha }}"
          ref="ghcr.io/${owner,,}/${{ matrix.name }}"
          {
            echo "ref=${ref}"
            echo "scan=${ref}:sha-${sha}"
          } >> "${GITHUB_OUTPUT}"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.ref }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=staging,enable={{is_default_branch}}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
          platforms: linux/amd64

      # ── Image vulnerability scanning (fully ADVISORY) ───────────────────────
      # The build + push above is the hard deliverable; scanning must never fail
      # it. Every step here is continue-on-error because: (a) trivy-action prunes
      # pinned patch tags (0.28.0 was removed → "unable to resolve action"), so
      # we track @master; (b) base-image CVEs are disclosed daily; and (c)
      # upload-sarif needs code scanning (GHAS), which a private repo may lack.
      # Findings still surface in the logs / Security tab, but never turn the
      # pipeline red. Pin @master to a SHA and promote to hard gates once a
      # scanning/patch cadence is established.
      - name: Trivy vuln scan (report SARIF)
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.img.outputs.scan }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          trivyignores: .trivyignore

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

      - name: Trivy gate (report fixable CRITICAL)
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.img.outputs.scan }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore
